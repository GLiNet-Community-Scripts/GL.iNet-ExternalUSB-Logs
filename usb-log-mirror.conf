# /etc/usb-log-mirror.conf
# Optional overrides for usb-log-mirror.sh

# USB mount point used for persistent logs
USB_MOUNT="/mnt/sda1"

# Log location on USB
LOG_SUBDIR="gl-usb-logs"
LOG_NAME="system.log"

# Rotation and retry behavior
MAX_SIZE_KB="5120"
MAX_FILES="5"
RETRY_SECONDS="10"
CHECK_EVERY_LINES="50"
